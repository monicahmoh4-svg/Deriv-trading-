services:
  - type: web
    name: deriv-trading-backend
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: deriv-trading-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: DERIV_APP_ID
        value: "1089"
      - key: FRONTEND_URL
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "100"

databases:
  - name: deriv-trading-db
    plan: starter
    databaseName: deriv_trading
    user: deriv_trading
